<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holola'i - Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Radley&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="logo-brand">
      <img src="/images/logo.png" alt="Holola'i Logo" class="logo">
      <span class="brand-name">Holola'i</span>
    </div>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/gallery/">Gallery</a>
      <a href="/booking/">Booking</a>
    </nav>
  </header>

  <section class="gallery">
    <h2>Gallery</h2>
    <div class="gallery-grid">
      <div class="thumb">
        <img src="/images/photo1.jpg" alt="Photo 1">
        <span class="label">Event 1</span>
      </div>
      <div class="thumb">
        <img src="/images/photo2.jpg" alt="Photo 2">
        <span class="label">Event 2</span>
      </div>
      <div class="thumb">
        <img src="/images/photo3.jpg" alt="Photo 3">
        <span class="label">Event 3</span>
      </div>
      <div class="thumb">
        <img src="/images/photo4.jpg" alt="Photo 4">
        <span class="label">Event 4</span>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <p>&copy; 2026 Holola'i. All rights reserved.</p>
    <nav class="footer-nav">
      <a href="/">Home</a>
      <a href="/gallery/">Gallery</a>
      <a href="/booking/">Booking</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Contact</a>
    </nav>
  </footer>
</body>
</html>
